name: 'Copilot Setup Steps'

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:

  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps,
      # for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "rust-cache-${{ hashFiles('**/Cargo.lock') }}"
          cache-on-failure: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          activate-environment: true
          ignore-nothing-to-cache: true
          python-version: 3.12

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install lefthook
        run: lefthook install

      - name: Install cargo-insta
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: cargo-insta

      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: cargo-nextest

      - name: Install taplo
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: taplo

      - name: Install typos
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2
        with:
          tool: typos-cli
      - name: Verify installation
        run: |
          echo "🦀 Rust toolchain:"
          rustc --version
          cargo --version

          echo "🐍 Python environment:"
          python --version
          uv --version

          echo "📦 Node.js tools:"
          bun --version

          echo "🔧 Development tools:"
          cargo insta --version
          cargo nextest --version
          taplo --version
          typos --version

          echo "🧪 Testing lefthook tools via bunx:"
          echo "✓ bunx can access dprint: $(bunx dprint --version > /dev/null 2>&1 && echo 'yes' || echo 'no')"
          echo "✓ bunx can access commitlint: $(bunx commitlint --version > /dev/null 2>&1 && echo 'yes' || echo 'no')"
